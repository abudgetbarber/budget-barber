<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Barber – Choose Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow', sans-serif;
  background: #003D2B;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px 40px;
}

/* LOGO — matches app topbar style */
.logo-box {
  background: #F5E030;
  border-radius: 10px;
  padding: 12px 28px;
  text-align: center;
  margin-bottom: 6px;
  display: inline-block;
}
.logo-top {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: #003D2B;
  line-height: 1;
  letter-spacing: 2px;
  display: block;
}
.logo-divider {
  background: #003D2B;
  height: 3px;
  margin: 6px -28px;
}
.logo-bottom {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: #003D2B;
  line-height: 1;
  letter-spacing: 2px;
  display: block;
}
.tagline {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-top: 14px;
  margin-bottom: 32px;
}

/* HEADING */
h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: white;
  text-align: center;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 28px;
}

/* PORTAL CARDS */
.portal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  margin-bottom: 16px;
}
.portal-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 22px 12px 18px;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  display: block;
  transition: all 0.2s;
}
.portal-btn:hover {
  background: rgba(245,224,48,0.12);
  border-color: #F5E030;
  transform: translateY(-2px);
}
.portal-btn:active {
  transform: scale(0.97);
}
.portal-icon {
  font-size: 34px;
  display: block;
  margin-bottom: 10px;
}
.portal-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: #F5E030;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
}
.portal-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
  display: block;
}
.portal-btn.admin-btn {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 16px 20px;
  background: rgba(124,58,237,0.15);
  border-color: rgba(124,58,237,0.3);
}
.portal-btn.admin-btn:hover {
  background: rgba(124,58,237,0.25);
  border-color: #a78bfa;
}
.portal-btn.admin-btn .portal-icon {
  font-size: 28px;
  margin: 0;
}
.portal-btn.admin-btn .portal-text {
  text-align: left;
}


.footer-note {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  text-align: center;
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="logo-box">
  <span class="logo-top">BUDGET</span>
  <div class="logo-divider"></div>
  <span class="logo-bottom">BARBER</span>
</div>
<div class="tagline">Digital Men's Salon</div>

<h1>Choose Your Portal</h1>
<div class="subtitle">Select who you are to continue</div>

<div class="portal-grid">

  <a href="login-customer.html" class="portal-btn">
    <span class="portal-icon">👤</span>
    <span class="portal-name">Customer</span>
    <span class="portal-desc">Style cards & history</span>
  </a>

  <a href="login-barber.html" class="portal-btn">
    <span class="portal-icon">✂️</span>
    <span class="portal-name">Barber</span>
    <span class="portal-desc">Log sales & styles</span>
  </a>

  <a href="login-manager.html" class="portal-btn">
    <span class="portal-icon">🏪</span>
    <span class="portal-name">Manager</span>
    <span class="portal-desc">Dashboard & analytics</span>
  </a>

  <a href="login-franchise.html" class="portal-btn franchise-btn">
    <span class="portal-icon">🏢</span>
    <span class="portal-name">Franchise</span>
    <span class="portal-desc">View-only outlet</span>
  </a>

  <a href="login-admin.html" class="portal-btn admin-btn">
    <span class="portal-icon">🛡️</span>
    <div class="portal-text">
      <span class="portal-name">Admin</span>
      <span class="portal-desc">All salons · Complete control</span>
    </div>
  </a>

</div>

<div class="footer-note">© 2026 Budget Barber · Digital Men's Salon</div>

<script>

}
</script>
</body>
</html>
